<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Baby Tracker — development & guidance</title>
<meta name="description" content="A private, offline-first guide to your baby's development, sleep, feeding, milk, weaning, vaccinations and health checks — grounded in UK, Irish and French guidance." />
<style>
  :root{
    --bg:#f6f8fb; --card:#ffffff; --ink:#1f2733; --muted:#6b7488; --line:#e6e9f0;
    --brand:#3b7a8c; --brand-2:#5aa6b6; --accent:#e98a7a; --accent-2:#f3b8ab;
    --green:#2f9e6f; --amber:#d99311; --red:#d6584c; --soft:#eef5f7;
    --uk:#2557a7; --ie:#1c8a4e; --fr:#5b54c4;
    --radius:16px; --shadow:0 6px 20px rgba(30,50,90,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  a{color:var(--brand)}
  h1,h2,h3{margin:0 0 .4em; line-height:1.25}
  h2{font-size:1.35rem}
  h3{font-size:1.05rem}
  .wrap{max-width:1040px; margin:0 auto; padding:0 1rem 4rem}
  header.top{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);color:#fff; padding:1.1rem 1rem .9rem;}
  .top-inner{max-width:1040px; margin:0 auto; display:flex; align-items:center; gap:.8rem; flex-wrap:wrap}
  .logo{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:1.5rem}
  .brandname{font-weight:700;font-size:1.25rem;letter-spacing:.2px}
  .brandsub{font-size:.74rem;text-transform:uppercase;letter-spacing:1.3px;opacity:.85}
  .babychip{margin-left:auto;background:rgba(255,255,255,.16);border-radius:999px;padding:.35rem .8rem;font-size:.85rem;display:flex;gap:.5rem;align-items:center}
  .babychip b{font-weight:600}
  nav.tabs{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);box-shadow:0 2px 8px rgba(30,50,90,.04)}
  .tabs-inner{max-width:1040px;margin:0 auto;display:flex;gap:.1rem;overflow-x:auto;padding:0 .4rem}
  .tabs button{border:0;background:none;padding:.85rem .8rem;font-size:.9rem;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;font-weight:500;font-family:inherit}
  .tabs button:hover{color:var(--ink)}
  .tabs button.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.2rem;margin:1rem 0}
  .card.tight{padding:1rem}
  .card.hi{border-color:var(--accent-2);box-shadow:0 6px 20px rgba(233,138,122,.18)}
  .grid{display:grid;gap:1rem}
  @media(min-width:680px){.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:1fr 1fr 1fr}}
  .muted{color:var(--muted)}
  .small{font-size:.85rem}
  .tiny{font-size:.78rem}
  button.btn,a.btn{display:inline-flex;align-items:center;gap:.4rem;border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:10px;padding:.5rem .9rem;font-size:.9rem;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit}
  button.btn:hover,a.btn:hover{background:#33697a}
  button.btn.ghost,a.btn.ghost{background:#fff;color:var(--brand)}
  button.btn.ghost:hover{background:var(--soft)}
  button.btn.danger{background:#fff;color:var(--red);border-color:var(--red)}
  button.btn.danger:hover{background:#fdeceb}
  button.btn.small,a.btn.small{padding:.32rem .6rem;font-size:.8rem}
  input,select,textarea{font-family:inherit;font-size:.92rem;padding:.5rem .6rem;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);width:100%}
  input[type=checkbox]{width:auto;min-width:18px;min-height:18px}
  label.fld{display:block;margin:.5rem 0}
  label.fld .lbl{font-size:.8rem;color:var(--muted);font-weight:600;display:block;margin-bottom:.2rem}
  .row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:flex-end}
  .row > *{flex:1;min-width:120px}
  .dobrow{display:flex;gap:.5rem}
  .dobrow select{flex:1}
  .pill{display:inline-block;padding:.16rem .55rem;border-radius:999px;font-size:.74rem;font-weight:600}
  .pill.done{background:#e6f5ee;color:var(--green)}
  .pill.due{background:#fdf1dc;color:var(--amber)}
  .pill.over{background:#fce9e7;color:var(--red)}
  .pill.up{background:#eef0f4;color:var(--muted)}
  .pill.uk{background:#e7eefa;color:var(--uk)}
  .pill.ie{background:#e3f5ea;color:var(--ie)}
  .pill.fr{background:#ecebfb;color:var(--fr)}
  .sched{display:flex;gap:.8rem;align-items:flex-start;padding:.7rem 0;border-top:1px solid var(--line)}
  .sched:first-child{border-top:0}
  .sched .when{min-width:96px;font-weight:600;font-size:.86rem}
  .sched .body{flex:1}
  .sched .ctl{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
  .vlist{margin:.3rem 0 0;padding:0;list-style:none;font-size:.9rem}
  .vlist li{padding:.1rem 0 .1rem 1.1rem;position:relative}
  .vlist li:before{content:"•";position:absolute;left:.2rem;color:var(--brand-2)}
  .banner{border-radius:12px;padding:.8rem 1rem;font-size:.88rem;display:flex;gap:.6rem;align-items:flex-start}
  .banner.warn{background:#fff7e8;border:1px solid #f3dca0;color:#7a5a12}
  .banner.info{background:var(--soft);border:1px solid #cfe3e8;color:#225863}
  .banner .ic{font-size:1.1rem;line-height:1}
  table{width:100%;border-collapse:collapse;font-size:.88rem}
  th,td{text-align:left;padding:.5rem .5rem;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-size:.76rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  tr.now td{background:#fff4f1}
  .kpi{display:flex;flex-direction:column;gap:.15rem}
  .kpi .v{font-size:1.7rem;font-weight:700;color:var(--brand)}
  .kpi .l{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .actitem{display:flex;gap:.7rem;align-items:flex-start;padding:.6rem 0;border-top:1px solid var(--line)}
  .actitem:first-child{border-top:0}
  .actitem .cat{font-size:1.3rem;line-height:1.2}
  .actitem.checked{opacity:.55}
  .actitem.checked .t{text-decoration:line-through}
  .donerow{display:flex;gap:.5rem;align-items:center}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:.4rem .7rem;font-size:.84rem;cursor:pointer;font-family:inherit;color:var(--muted)}
  .seg button.on{background:var(--brand);color:#fff}
  .flag{color:var(--red);font-weight:600}
  details.acc{border:1px solid var(--line);border-radius:12px;margin:.6rem 0;overflow:hidden;background:#fff}
  details.acc>summary{cursor:pointer;padding:.7rem .9rem;font-weight:600;list-style:none}
  details.acc>summary::-webkit-details-marker{display:none}
  details.acc>summary:before{content:"▸ ";color:var(--brand-2)}
  details.acc[open]>summary:before{content:"▾ "}
  details.acc .inner{padding:0 .9rem .8rem}
  .srcs a{display:inline-block;margin:.15rem .5rem .15rem 0;font-size:.82rem}
  .country-tag{font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px}
  .country-tag.uk{color:var(--uk)} .country-tag.ie{color:var(--ie)} .country-tag.fr{color:var(--fr)}
  footer.foot{max-width:1040px;margin:2rem auto 0;padding:1rem;color:var(--muted);font-size:.8rem;text-align:center}
  .hidden{display:none}
  .empty{color:var(--muted);font-style:italic;padding:.6rem 0}
  svg .grid{stroke:#eef1f6;stroke-width:1}
  svg text{font-size:10px;fill:var(--muted)}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="logo" aria-hidden="true">👶</div>
    <div>
      <div class="brandname">Baby Tracker</div>
      <div class="brandsub">Development, health &amp; guidance</div>
    </div>
    <div class="babychip" id="babychip"></div>
  </div>
</header>

<nav class="tabs"><div class="tabs-inner" id="tabs"></div></nav>
<main class="wrap" id="view"></main>

<footer class="foot">
  <p><strong>Baby Tracker</strong> is a private, offline-first tool. All data stays in this browser.
  It is an information aid, <strong>not medical advice</strong>. Always follow your GP, health visitor, PHN or paediatrician.</p>
</footer>

<script>
"use strict";
/* ============================================================
   Baby Tracker — single-file, zero-build, offline-first.
   No server, no dependencies. Data in localStorage.
   Guidance grounded in UK (NHS/UKHSA), Irish (HSE) and French
   (ameli/sante.gouv) sources — see "Guides & sources".
   ============================================================ */

const KEY = "babytracker.v1";

const DEFAULT_STATE = {
  baby:{ name:"Baby", dob:"2025-06-05", sex:"", term:"term", feeding:"mixed", vitD:"uk" },
  settings:{ primary:"uk", show:{uk:true, ie:true, fr:true} },
  done:{ vax:{}, checks:{}, milestones:{}, actions:{} },
  meta:{ created: Date.now() }
};

function load(){
  try{
    const raw = localStorage.getItem(KEY) || localStorage.getItem("littlesteps.v1");
    if(!raw) return structuredClone(DEFAULT_STATE);
    return deepMerge(structuredClone(DEFAULT_STATE), JSON.parse(raw));
  }catch(e){ return structuredClone(DEFAULT_STATE); }
}
function deepMerge(base, over){
  for(const k in over){
    if(over[k] && typeof over[k]==="object" && !Array.isArray(over[k]) && typeof base[k]==="object" && !Array.isArray(base[k])) deepMerge(base[k], over[k]);
    else base[k]=over[k];
  }
  return base;
}
let state = load();
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); renderChip(); }

/* ---------- dates ---------- */
const DAY = 86400000;
function parseDate(s){ const d=new Date(s+"T00:00:00"); return isNaN(d)?null:d; }
function dob(){ return parseDate(state.baby.dob) || new Date(); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addWeeks(d,n){ return addDays(d,n*7); }
function addMonths(d,n){ const x=new Date(d); const day=x.getDate(); x.setMonth(x.getMonth()+n); if(x.getDate()<day) x.setDate(0); return x; }
function dueDate(at){
  let d=dob();
  if(at.weeks!=null) d=addWeeks(d,at.weeks);
  if(at.months!=null) d=addMonths(d,at.months);
  if(at.days!=null) d=addDays(d,at.days);
  return d;
}
function isoDay(d){ return d.toISOString().slice(0,10); }
function fmtDate(d){ if(typeof d==="string") d=parseDate(d); if(!d) return "—"; return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); }
function today(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function ageParts(from=today()){
  const b=dob();
  let months=(from.getFullYear()-b.getFullYear())*12+(from.getMonth()-b.getMonth());
  if(from.getDate()<b.getDate()) months--;
  const totalDays=Math.round((from-b)/DAY);
  return { months, weeks:Math.floor(totalDays/7), totalDays };
}
function ageMonths(){ return (today()-dob())/(DAY*30.4375); }
function ageLabel(){
  const a=ageParts();
  if(a.totalDays<0) return "not born yet";
  if(a.weeks<13) return `${a.weeks} week${a.weeks===1?"":"s"} old`;
  const lastMonthDate=addMonths(dob(),a.months);
  const days=Math.round((today()-lastMonthDate)/DAY);
  return `${a.months} month${a.months===1?"":"s"}${days?`, ${days} day${days===1?"":"s"}`:""} old`;
}
function statusFor(due, doneDate){
  if(doneDate) return {k:"done", label:"Done "+fmtDate(doneDate)};
  const diff=Math.round((due-today())/DAY);
  if(diff<-14) return {k:"over", label:"Overdue"};
  if(diff<0) return {k:"over", label:"Due now"};
  if(diff<=42) return {k:"due", label:diff===0?"Due today":`Due in ${diff} day${diff===1?"":"s"}`};
  return {k:"up", label:"From "+fmtDate(due)};
}

/* ============================================================
   GUIDANCE DATA (sourced — see Guides tab)
   ============================================================ */
const VAX = {

      {id:"fr-3m", at:{months:3}, when:"3 mois", v:["Méningocoque B — 1"]},

      {id:"fr-5m", at:{months:5}, when:"5 mois", v:["Méningocoque B — 2"]},
      {id:"fr-6m", at:{months:6}, when:"6 mois", v:["Méningocoque ACWY — 1"]},
      {id:"fr-11m", at:{months:11}, when:"11 mois", v:["Hexavalent — booster","Pneumocoque — booster"]},
      {id:"fr-12m", at:{months:12}, when:"12 mois", v:["ROR (MMR) — 1","Méningocoque B — 3","Méningocoque ACWY — 2"]},

      {id:"fr-6y", at:{months:72}, when:"6 ans", v:["DTP-coqueluche — booster"]}

const CHECKS = {

      {id:"uk-6w", at:{weeks:6}, when:"6–8 weeks", t:"6–8 week check (GP)", d:"Baby's physical exam (heart, hips, eyes, testes) + mum's postnatal check."},

      {id:"ie-2w", at:{weeks:2}, when:"2 weeks", t:"Newborn GP check", d:"GP examination."},
      {id:"ie-6w", at:{weeks:6}, when:"6 weeks", t:"6-week baby check (GP)", d:"Baby check + maternal 6-week check."},

      {id:"ie-79m", at:{months:8}, when:"7–9 months", t:"PHN developmental check", d:"Physical, social, behaviour; hearing/vision observed."},
      {id:"ie-2y", at:{months:22}, when:"18–24 months", t:"Developmental check", d:"Age-2 review under the GP Visit Card."}
    ]},

      {id:"fr-2w", at:{weeks:2}, when:"2nd week", t:"Examen obligatoire", d:""},
      {id:"fr-1m", at:{months:1}, when:"1 mois", t:"Examen obligatoire", d:""},

      {id:"fr-24m", at:{months:24}, when:"24th month", t:"Examen + certificat de santé", d:"Compulsory; generates a health certificate.", cert:true}
    ]}

/* Parent-action markers — the food/sleep/milk/safety changes to make,
   shown on Today when relevant to the baby's age. */
const ACTIONS = [
  {id:"act-vitd", cat:"💊", from:0, to:24, oneoff:false, t:"Give daily vitamin D", d:"Every day — see Feeding tab for your country's dose (UK/IE/FR differ)."},
  {id:"act-sleep", cat:"🛡️", from:0, to:6, oneoff:false, t:"Safe sleep, every sleep", d:"Back to sleep, own clear firm cot, room-share for the first 6 months."},
  {id:"act-tummy", cat:"🤸", from:0, to:6, oneoff:false, t:"Daily tummy time", d:"Builds head control and strength while awake and supervised."},
  {id:"act-weansigns", cat:"👀", from:4, to:6, oneoff:true, t:"Watch for weaning readiness", d:"Sits with support & steady head, hand–eye–mouth coordination, can swallow food. Don't start before 17 weeks."},

const MILESTONES = [
  {band:"6–8 weeks", m:6, items:[
    {id:"ms-smile", t:"First social smile"},{id:"ms-watch", t:"Watches your face, follows with eyes"},{id:"ms-coo", t:"Makes cooing sounds"}
  ], flags:["No response to loud sounds","Not focusing on or following a face"]},
  {band:"3–4 months", m:14, items:[

const disclaimer = `<div class="banner warn"><span class="ic">ℹ️</span><div><strong>Not medical advice.</strong> Ages and ranges are general guides from public UK, Irish &amp; French sources and can change. Your baby is unique — always confirm with your GP, health visitor, PHN or paediatrician, and your Red Book / carnet de santé.</div></div>`;

/* ---------- TODAY ---------- */
function homeScheduled(){
  const primary=state.settings.primary, out=[];
  VAX[primary].items.forEach(it=>{
    const due=dueDate(it.at), st=statusFor(due, state.done.vax[it.id]);
    if(st.k!=="done") out.push({kind:"vax", id:it.id, type:"💉 Vaccine", when:it.when, due, st, label:it.v.join(", ")});
  });
  CHECKS[primary].items.forEach(it=>{
    const due=dueDate(it.at), st=statusFor(due, state.done.checks[it.id]);
    if(st.k!=="done") out.push({kind:"checks", id:it.id, type:"🩺 Check", when:it.when, due, st, label:it.t});
  });
  out.sort((a,b)=>a.due-b.due); // soonest first (prioritise upcoming)
  return out;
}
function activeActions(){
  const m=ageMonths();
  // relevant now, or starting within ~6 weeks
  return ACTIONS
    .map(a=>({a, imminence: a.from - m})) // <=0 means already in window
    .filter(x=> ageMonths()<= x.a.to+0.1 && x.imminence<=1.5 && !(x.a.oneoff && state.done.actions[x.a.id]))
    .sort((x,y)=> (x.imminence>0?1:0)-(y.imminence>0?1:0) || y.a.from-x.a.from); // current first, then most recently-relevant
}
function viewHome(){
  const a=ageParts();
  const sched=homeScheduled();
  const overdue=sched.filter(x=>x.st.k==="over");
  const soon=sched.filter(x=>x.st.k==="due");
  const later=sched.filter(x=>x.st.k==="up").slice(0,3);
  const acts=activeActions();
  const msDone=Object.keys(state.done.milestones).length;
  const actsToDo=acts.filter(x=>x.a.oneoff).length;
  return `
  ${disclaimer}
  <div class="grid three">
    <div class="card tight"><div class="kpi"><span class="v">${a.totalDays<0?"—":(a.weeks<13?a.weeks+"w":a.months+"m")}</span><span class="l">${a.totalDays<0?"not born":esc(ageLabel())}</span></div></div>
    <div class="card tight"><div class="kpi"><span class="v">${overdue.length+soon.length}</span><span class="l">Appointments due soon</span></div></div>
    <div class="card tight"><div class="kpi"><span class="v">${msDone}</span><span class="l">Milestones ticked</span></div></div>
  </div>

  ${overdue.length?`<div class="card hi"><h3>⚠️ Overdue / due now — tick when done</h3>${overdue.map(rowSched).join("")}</div>`:""}

  <div class="card${soon.length?" hi":""}">
    <h3>🔜 Coming up soon <span class="muted small">· ${state.settings.primary.toUpperCase()} schedule · tick when done</span></h3>
    ${soon.length?soon.map(rowSched).join(""):`<div class="empty">Nothing due in the next 6 weeks.</div>`}
    ${later.length?`<h4 class="muted small" style="margin:.9rem 0 .2rem">Later</h4>${later.map(rowSched).join("")}`:""}
  </div>

  <div class="card">
    <h3>🌟 What to do now <span class="muted small">· important changes for ${esc(state.baby.name||"your baby")}'s age</span></h3>
    ${acts.length?acts.map(rowAction).join(""):`<div class="empty">Nothing flagged for this age right now — keep going with daily vitamin D, safe sleep and lots of talking.</div>`}
    <p class="tiny muted" style="margin-top:.6rem">Tick the one-off changes (●) once you've made them. Ongoing habits stay listed as reminders.</p>
  </div>`;
}
function rowSched(x){
  const map=x.kind==="vax"?"vax":"checks";
  return `<div class="actitem">
    <input type="checkbox" data-homedone="${map}:${x.id}" />
    <div style="flex:1">
      <div class="donerow"><span class="pill ${x.st.k}">${x.st.label}</span><strong>${x.type}</strong></div>
      <div class="small">${esc(x.label)}</div>
      <div class="tiny muted">${x.when} · ${fmtDate(x.due)}</div>
    </div>
  </div>`;
}
function rowAction(x){
  const a=x.a, done=a.oneoff&&state.done.actions[a.id];
  return `<div class="actitem ${done?"checked":""}">
    ${a.oneoff?`<input type="checkbox" data-actiondone="${a.id}" ${done?"checked":""}/>`:`<span class="cat">${a.cat}</span>`}
    <div style="flex:1">
      <div class="t"><strong>${a.oneoff?a.cat+" ":""}${esc(a.t)}</strong> ${x.imminence>0?`<span class="pill up">soon</span>`:`<span class="pill due">now</span>`}</div>
      <div class="small muted">${esc(a.d)}</div>
    </div>
  </div>`;
}
function bindHome(){
  document.querySelectorAll("[data-homedone]").forEach(cb=>cb.onchange=()=>{
    const [kind,id]=cb.dataset.homedone.split(":");
    const map=kind==="vax"?state.done.vax:state.done.checks;
    if(cb.checked) map[id]=isoDay(today()); else delete map[id];
    save(); render();
  });
  document.querySelectorAll("[data-actiondone]").forEach(cb=>cb.onchange=()=>{
    const id=cb.dataset.actiondone;
    if(cb.checked) state.done.actions[id]=isoDay(today()); else delete state.done.actions[id];

  });
}

function bandProgress(band){

function feedingNow(m){
  if(m<0) return "Not born yet.";
  if(m<4) return "Milk only. Breastfeed responsively (on demand), or ≈150–200 ml/kg/day of formula across 8+ feeds. No solids yet — not before 17 weeks.";
  if(m<6) return "Still milk-led. Watch for weaning readiness (sits with support, steady head, hand–eye–mouth coordination). You can start solids from around 6 months.";
  if(m<7) return "Weaning time: offer smooth purées and soft finger foods alongside full milk feeds. Introduce the common allergens one at a time.";
  if(m<10) return "Building to 2–3 meals a day plus milk. Offer water in a cup with meals. Keep adding textures and new allergens.";
  if(m<12) return "About 3 meals a day plus ~3 milk feeds. More finger foods and self-feeding; lumpier textures.";
  if(m<18) return "3 meals + snacks. From 12 months whole cows' milk can be the main drink (~350 ml/day or 2 dairy servings). Move from bottles to cups.";
  return "Family meals — 3 meals + ~2 snacks and ~300–350 ml milk/day. Appetites swing day to day; that's normal.";
}
function viewFeeding(){
  const m=ageMonths();
  return `${disclaimer}
  <div class="card hi"><h2>Typical for ${esc(state.baby.name||"your baby")} now <span class="pill up">${m<0?"—":(m<3?ageParts().weeks+" wks":m.toFixed(0)+" mths")}</span></h2>
    <p>${feedingNow(m)}</p>
  </div>

  <div class="card"><h3>💧 Vitamin D</h3>
    <p class="small">Showing: <span class="seg" id="vitdseg">${["uk","ie","fr"].map(c=>`<button data-vd="${c}" class="${state.baby.vitD===c?"on":""}">${c.toUpperCase()}</button>`).join("")}</span></p>
    <p>${vitDText()}</p>
    <p class="tiny muted">Three different national doses — if you follow more than one country's advice, give only one source of vitamin D to avoid under- or over-dosing.</p>
  </div>

  <div class="card"><h3>🍼 Milk — what's normal by age</h3>
    <ul class="vlist">
      <li><strong>0–6 months:</strong> milk only. Formula guide ≈ <strong>150–200 ml/kg/day</strong> across feeds; newborns feed 8+ times/24h. Breastfeed on demand.</li>
      <li><strong>~6 months:</strong> start solids <em>alongside</em> milk — milk stays the main drink.</li>
      <li><strong>7–9 months:</strong> milk still the main drink; meals build up to 2–3 a day.</li>
      <li><strong>10–12 months:</strong> about <strong>3 milk feeds a day</strong> plus 3 meals.</li>
      <li><strong>From 12 months:</strong> whole cows' milk can be the main drink — <strong>~350 ml/day or 2 dairy servings</strong>. "Follow-on"/"toddler" milks aren't needed. Breastfeeding can continue as long as you both like.</li>
    </ul>
    <p class="tiny muted">FR note: in France a "lait de croissance" (growth milk) is commonly used to ~3 years instead of plain cows' milk.</p>
  </div>

  <div class="card"><h2>🥄 Weaning &amp; allergens</h2>
    <div class="banner info"><span class="ic">⏱️</span><div><strong>When:</strong> around <strong>6 months</strong> (UK/IE) — France allows a 4–6 month window. Never before 17 weeks. Readiness: sits with support &amp; steady head; hand–eye–mouth coordination; can swallow food.</div></div>
    <p class="small" style="margin-top:.6rem"><strong>Introduce the common allergens one at a time, from the start of weaning</strong> — delaying can <em>increase</em> allergy risk. Watch each for a few days:</p>
    <table><thead><tr><th>Allergen</th><th>How to offer</th></tr></thead><tbody>
      ${ALLERGENS.map(al=>`<tr><td><strong>${esc(al.t)}</strong></td><td class="small muted">${esc(al.note||"As a normal first food.")}</td></tr>`).join("")}
    </tbody></table>
    <h4 style="margin:.9rem 0 .3rem">Foods to avoid</h4>
    <ul class="vlist">
      <li><strong>Honey</strong> — none before 12 months (botulism risk).</li>
      <li><strong>Added salt</strong> — none (avoid stock cubes, gravies, salty/processed foods).</li>
      <li><strong>Added sugar</strong> &amp; sugary drinks — avoid.</li>
      <li><strong>Whole nuts &amp; whole grapes</strong> — choking risk; nuts only ground/as butter; cut grapes/cherry tomatoes lengthways. No whole nuts before age 5.</li>
      <li><strong>Shark, swordfish, marlin</strong> — avoid (mercury); limit oily fish.</li>
      <li>Raw/undercooked egg unless British Lion (UK) marked; unpasteurised cheeses; rice drinks as a milk substitute under 5.</li>
      <li><strong>Never leave baby alone while eating.</strong></li>
    </ul>

}
function vitDText(){
  const which=state.baby.vitD;
  if(which==="fr") return `<strong>France:</strong> a prescribed vitamin-D medicine (e.g. ZYMAD/ADRIGYL) from birth, typically <strong>400–1000 IU/day</strong> (often ~800 IU; higher for breastfed/preterm/darker skin). France doses higher than UK/IE — don't double up.`;
  if(which==="ie") return `<strong>Ireland (HSE):</strong> <strong>5 µg (200 IU) vitamin D3 daily from birth to 12 months</strong> for all babies, <em>unless</em> taking more than 300 ml of formula a day.`;
  return `<strong>UK (NHS):</strong> breastfed babies <strong>8.5–10 µg (340–400 IU) daily from birth</strong>. Formula-fed: not needed if taking ≥500 ml/day; if less, give 8.5–10 µg. From age 1: 10 µg/day.`;
}
function bindFeeding(){

/* ---------- GROWTH (info only) ---------- */
function viewGrowth(){
  const m=ageMonths(); const sex=state.baby.sex;
  let nowCard;
  if(!sex){
    nowCard=`<div class="banner info"><span class="ic">⚙️</span><div>Set your baby's sex in <a href="#" id="g-tosettings">Settings</a> to see the typical weight for their age.</div></div>`;
  }else if(m<0){
    nowCard=`<p class="muted">Not born yet.</p>`;
  }else{
    const idx=Math.max(0,Math.min(24,Math.round(m)));
    const med=WHO50[sex][idx];
    nowCard=`<p>At about <strong>${m<3?ageParts().weeks+" weeks":idx+" months"}</strong>, the <strong>typical (50th-centile) weight</strong> for a ${sex==="male"?"boy":"girl"} is roughly <strong>${med} kg</strong>.</p>
      <p class="small muted">Healthy babies span a wide range around this (roughly the 2nd–98th centiles). What matters is that your baby <strong>tracks steadily along their own line</strong> — not the exact number.</p>`;
  }
  return `${disclaimer}
  <div class="card hi"><h2>Growth — what's normal now</h2>${nowCard}</div>
  ${sex?`<div class="card"><h3>WHO 50th-centile weight (0–24 months)</h3>${growthRefChart(sex,m)}<p class="tiny muted">Reference line only (your Red Book / carnet de santé has the full centile chart). The marker shows your baby's current age on the median line.</p></div>`:""}
  <div class="card"><h3>Understanding centiles</h3>
    <ul class="vlist">
      <li>A centile ranks your baby against 100 others of the same age and sex — there's <strong>no "best" centile</strong>.</li>
      <li>Babies usually <strong>track along their own centile line</strong>; the <em>pattern over time</em> matters more than any single point.</li>
      <li>Worth raising with your health visitor/GP: a <strong>sustained drop across 2 centile spaces</strong>, a plateau, or crossing upwards.</li>
      <li><strong>Newborns</strong> can lose up to ~10% of birth weight in the first days and usually regain it by ~2 weeks; more than 10% warrants a feeding review.</li>
    </ul>
  </div>
  <div class="banner info"><span class="ic">📖</span><div>Growth is recorded in the <strong>UK-WHO charts</strong> (Red Book) in England, PHN records in Ireland, and the <strong>carnet de santé</strong> in France — bring it to every weigh-in.</div></div>`;
}
function growthRefChart(sex,curM){
  const W=620,H=280,pad=36,maxM=24,maxW=14;
  const x=mm=>pad+(mm/maxM)*(W-pad*2);
  const y=w=>H-pad-(w/maxW)*(H-pad*2);
  const ref=WHO50[sex];
  const refPts=ref.map((w,mm)=>`${x(mm)},${y(w)}`).join(" ");
  let grid="";
  for(let w=0;w<=maxW;w+=2){ grid+=`<line class="grid" x1="${pad}" y1="${y(w)}" x2="${W-pad}" y2="${y(w)}"/><text x="4" y="${y(w)+3}">${w}kg</text>`; }
  for(let mm=0;mm<=maxM;mm+=3){ grid+=`<line class="grid" x1="${x(mm)}" y1="${pad}" x2="${x(mm)}" y2="${H-pad}"/><text x="${x(mm)-6}" y="${H-pad+14}">${mm}m</text>`; }
  let marker="";
  if(curM>=0&&curM<=maxM){ const idx=Math.max(0,Math.min(24,Math.round(curM))); marker=`<line x1="${x(curM)}" y1="${pad}" x2="${x(curM)}" y2="${H-pad}" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4 3"/><circle cx="${x(curM)}" cy="${y(ref[idx])}" r="5" fill="var(--accent)"/>`; }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="WHO weight reference">${grid}<polyline fill="none" stroke="#9aa6b6" stroke-width="2.5" points="${refPts}"/>${marker}</svg>`;
}
function bindGrowth(){
  const ts=document.getElementById("g-tosettings"); if(ts) ts.onclick=e=>{ e.preventDefault(); view="data"; render(); };
}

/* ---------- VACCINATIONS / CHECKS (schedules, latest first) ---------- */
function viewVax(){ return scheduleView("vax", VAX, "Vaccinations", state.done.vax); }
function viewChecks(){ return scheduleView("checks", CHECKS, "Health & development checks", state.done.checks); }
function scheduleView(kind, DATA, title, doneMap){
  const primary=state.settings.primary;
  const order=[primary, ...["uk","ie","fr"].filter(c=>c!==primary)];
  return `${disclaimer}
  <div class="card"><h2>${title}</h2>
  <p class="small muted">Dates computed from date of birth (${fmtDate(state.baby.dob)}), shown <strong>most recent first</strong>. Your home country (${primary.toUpperCase()}) leads; the others are reference. Tick items off as they're done.</p>
  ${kind==="vax"?`<p class="tiny muted">⚠️ Vaccine schedules differ by country and are not interchangeable — your GP reconciles the Red Book / carnet de santé if records cross borders.</p>`:""}
  </div>
  ${order.filter(c=>state.settings.show[c]).map(c=>{
    const D=DATA[c];
    const items=[...D.items].sort((a,b)=>dueDate(b.at)-dueDate(a.at)); // latest first
    return `<div class="card">
      <h3><span class="country-tag ${c}">${c.toUpperCase()}</span> · ${esc(D.label)} ${c===primary?'<span class="pill done">home</span>':'<span class="pill up">reference</span>'}</h3>
      <p class="tiny muted">${esc(D.note||"")}</p>
      ${items.map(it=>{
        const due=dueDate(it.at), done=doneMap[it.id], st=statusFor(due,done);
        return `<div class="sched">
          <div class="when">${it.when}<br><span class="tiny muted">${fmtDate(due)}</span></div>
          <div class="body">
            ${it.v?`<ul class="vlist">${it.v.map(v=>`<li>${esc(v)}</li>`).join("")}</ul>`:`<strong>${esc(it.t)}</strong>${it.d?`<div class="small muted">${esc(it.d)}</div>`:""}`}
            ${it.badge?`<span class="pill due">${it.badge}</span> `:""}${it.cert?`<span class="pill fr">certificat</span>`:""}
          </div>
          <div class="ctl">
            <span class="pill ${st.k}">${st.label}</span>
            <label class="tiny" style="display:flex;gap:.3rem;align-items:center"><input type="checkbox" data-done="${kind}:${it.id}" ${done?"checked":""}/> done</label>
          </div>
        </div>`;
      }).join("")}
    </div>`;
  }).join("")}`;
}
function bindSched(){
  const map=view==="vax"?state.done.vax:state.done.checks;
  document.querySelectorAll("[data-done]").forEach(cb=>cb.onchange=()=>{
    const [,id]=cb.dataset.done.split(":");
    if(cb.checked) map[id]=isoDay(today()); else delete map[id];
    save(); render();
  });
}

/* ---------- NURSERY & SCHOOL ---------- */
function ukSchoolStartYear(){
  const b=dob(); let sepYear=b.getFullYear()+4;
  if(b.getMonth()>=8) sepYear=b.getFullYear()+5; // born Sep-Dec -> not 4 by 31 Aug
  return sepYear;
}
function isSummerBorn(){ const m=dob().getMonth(); return m>=3 && m<=7; }
function nextTermStart(d){ const y=d.getFullYear(); const c=[new Date(y,0,1),new Date(y,3,1),new Date(y,8,1),new Date(y+1,0,1)]; return c.find(x=>x>=d)||c[c.length-1]; }
function viewChildcare(){
  const b=dob(), termAfter9=nextTermStart(addMonths(b,9)), sep=ukSchoolStartYear();
  return `${disclaimer}
  <div class="card"><h2>🏫 Nursery, childcare &amp; school</h2>
  <p class="small muted">You live in England, so UK rules drive the timeline; Irish &amp; French systems are noted for reference.</p></div>
  <div class="card"><h3><span class="country-tag uk">UK</span> Funded childcare (England, working parents)</h3>
    <ul class="vlist">
      <li><strong>From the term after your baby turns 9 months</strong> (≈ ${fmtDate(termAfter9)}): eligible working parents get <strong>30 funded hours/week</strong> (term-time; can stretch over 52 weeks). Apply from ~23 weeks old.</li>
      <li><strong>All</strong> 3–4 year-olds get a <strong>universal 15 hours</strong> from the term after their 3rd birthday.</li>
      <li><strong>Tax-Free Childcare:</strong> government adds £2 per £8, up to £2,000/year per child.</li>
      <li>Eligibility (30h): each parent earns ≥ ~16h/week at minimum wage and under £100k.</li>
    </ul>
    <p class="tiny muted">Check the latest at childcarechoices.gov.uk — rates and rules change.</p>
  </div>
  <div class="card"><h3><span class="country-tag uk">UK</span> Starting school (England)</h3>
    <ul class="vlist">
      <li>Reception starts the <strong>September after the 4th birthday</strong>. For ${esc(state.baby.name||"your baby")} (born ${fmtDate(b)}): <strong>Reception ≈ September ${sep}</strong> (apply the preceding autumn, by ~15 Jan ${sep}).</li>
      <li><strong>Compulsory</strong> school age is the term after the 5th birthday.</li>
      ${isSummerBorn()?`<li><span class="flag">Summer-born (Apr–Aug):</span> you can request to <strong>defer</strong> within the year, or <strong>delay a full year</strong> to start Reception (not Year 1) in September ${sep+1} aged 5 — decided case-by-case. Worth researching early.</li>`:""}
    </ul>
  </div>
  <div class="grid two">
    <div class="card"><h3><span class="country-tag ie">IE</span> Ireland</h3>
      <ul class="vlist">
        <li><strong>ECCE</strong> free pre-school: 3 hrs/day, term-time, from ~2 yrs 8 months until primary.</li>
        <li><strong>NCS</strong> subsidy helps with younger childcare costs.</li>
        <li>"Junior Infants" usually starts age 4–5 (most at 5).</li>
      </ul></div>
    <div class="card"><h3><span class="country-tag fr">FR</span> France</h3>
      <ul class="vlist">
        <li><strong>Modes de garde:</strong> crèche, assistante maternelle (agréée), or garde à domicile — subsidised via CAF's <strong>CMG</strong>.</li>
        <li><strong>École maternelle</strong> compulsory from <strong>age 3</strong>.</li>
        <li><strong>1000 premiers jours</strong> programme supports the first ~2 years.</li>
      </ul></div>
  </div>`;
}

    <tr><td><strong>Vaccines</strong></td><td>Recommended; 8/12/16 wk, 12 &amp; 18 mth</td><td>Recommended; 2/4/6/12/13 mth (GP-given); chickenpox at 12m</td><td>Largely <strong>mandatory</strong>; 2/3/4/5/6/11/12 mth</td></tr>
    <tr><td><strong>Checks</strong></td><td>Health-visitor reviews + 6–8 wk GP check</td><td>PHN visits + free GP (Under-8s card)</td><td>20 mandatory exams; certificates at 8 days, 9 &amp; 24 months</td></tr>

  <div class="banner warn" style="margin-top:.8rem"><span class="ic">⚠️</span><div>Because doses and schedules genuinely differ, pick <strong>one</strong> approach per item (usually your UK GP's) and don't stack advice — e.g. don't give two vitamin-D products. Keep both the UK Red Book and any carnet de santé updated.</div></div>
  </div>
  <div class="card"><h2>Sources</h2>

/* ---------- SETTINGS ---------- */
function dobSelects(){
  const cur=parseDate(state.baby.dob)||new Date(2025,5,5);
  const d=cur.getDate(), mo=cur.getMonth(), y=cur.getFullYear();
  const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const nowY=new Date().getFullYear();
  const days=Array.from({length:31},(_,i)=>i+1).map(n=>`<option ${n===d?"selected":""}>${n}</option>`).join("");
  const monthOpts=months.map((nm,i)=>`<option value="${i}" ${i===mo?"selected":""}>${nm}</option>`).join("");
  const years=[]; for(let yy=nowY;yy>=2018;yy--) years.push(`<option ${yy===y?"selected":""}>${yy}</option>`);
  return `<div class="dobrow">
    <select id="p-dob-d" aria-label="Day">${days}</select>
    <select id="p-dob-m" aria-label="Month">${monthOpts}</select>
    <select id="p-dob-y" aria-label="Year">${years.join("")}</select>
  </div>`;
}
function viewData(){
  const b=state.baby;
  return `${disclaimer}
  <div class="card"><h2>Baby profile</h2>
    <label class="fld"><span class="lbl">Name</span><input id="p-name" value="${esc(b.name)}"/></label>
    <label class="fld"><span class="lbl">Date of birth</span>${dobSelects()}</label>
    <div class="row">
      <label class="fld"><span class="lbl">Sex (for growth reference)</span><select id="p-sex"><option value="">—</option><option value="female" ${b.sex==="female"?"selected":""}>Girl</option><option value="male" ${b.sex==="male"?"selected":""}>Boy</option></select></label>
      <label class="fld"><span class="lbl">Feeding</span><select id="p-feed">${["mixed","breast","formula"].map(f=>`<option value="${f}" ${b.feeding===f?"selected":""}>${f[0].toUpperCase()+f.slice(1)}</option>`).join("")}</select></label>
    </div>
    <div class="row">
      <label class="fld"><span class="lbl">Vitamin D guidance</span><select id="p-vitd">${["uk","ie","fr"].map(c=>`<option value="${c}" ${b.vitD===c?"selected":""}>${c.toUpperCase()}</option>`).join("")}</select></label>
      <label class="fld"><span class="lbl">Born</span><select id="p-term"><option value="term" ${b.term==="term"?"selected":""}>At/near term</option><option value="preterm" ${b.term==="preterm"?"selected":""}>Premature</option></select></label>
    </div>
    <button class="btn" id="p-save">Save profile</button>
  </div>
  <div class="card"><h3>Which countries to show</h3>
    <p class="small muted">Your home country leads schedules &amp; "Today"; the others appear as reference.</p>
    <label class="fld"><span class="lbl">Home country</span><select id="s-primary">${[["uk","United Kingdom"],["ie","Ireland"],["fr","France"]].map(([c,n])=>`<option value="${c}" ${state.settings.primary===c?"selected":""}>${n}</option>`).join("")}</select></label>
    <div class="row">${[["uk","UK"],["ie","Ireland"],["fr","France"]].map(([c,n])=>`<label class="tiny" style="flex:0 0 auto;display:flex;gap:.3rem;align-items:center"><input type="checkbox" data-show="${c}" ${state.settings.show[c]?"checked":""}/> Show ${n}</label>`).join("")}</div>
  </div>
  <div class="card"><h3>Your data</h3>
    <p class="small">Everything lives only in this browser (localStorage) — nothing is sent anywhere. Export a backup, or move it to another device/browser.</p>
    <div class="row">
      <button class="btn ghost" id="d-export">⬇️ Export backup (JSON)</button>
      <button class="btn ghost" id="d-import">⬆️ Import backup</button>
      <input type="file" id="d-file" accept="application/json" class="hidden"/>
      <button class="btn danger" id="d-reset">🗑️ Reset all data</button>
    </div>
    <p class="tiny muted" style="margin-top:.6rem">This is a single HTML file — keep a copy anywhere; it works fully offline.</p>
  </div>
  <div class="card"><h3>About</h3>
    <p class="small">Baby Tracker is a personal, offline tool grounded in UK, Irish &amp; French public-health guidance (see Guides &amp; sources). It does not replace professional advice. Created ${new Date(state.meta.created).toLocaleDateString("en-GB")}.</p>
  </div>`;
}
function bindData(){
  document.getElementById("p-save").onclick=()=>{
    state.baby.name=document.getElementById("p-name").value||"Baby";
    const d=+document.getElementById("p-dob-d").value, mo=+document.getElementById("p-dob-m").value, y=+document.getElementById("p-dob-y").value;
    const dt=new Date(y,mo,Math.min(d,new Date(y,mo+1,0).getDate()));
    state.baby.dob=isoDay(dt);
    state.baby.sex=document.getElementById("p-sex").value;
    state.baby.feeding=document.getElementById("p-feed").value;
    state.baby.vitD=document.getElementById("p-vitd").value;
    state.baby.term=document.getElementById("p-term").value;
    save(); render();
  };
  document.getElementById("s-primary").onchange=e=>{ state.settings.primary=e.target.value; state.baby.vitD=e.target.value; save(); render(); };
  document.querySelectorAll("[data-show]").forEach(c=>c.onchange=()=>{ state.settings.show[c.dataset.show]=c.checked; save(); });
  document.getElementById("d-export").onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob), a=document.createElement("a");
    a.href=url; a.download=`baby-tracker-${(state.baby.name||"baby").toLowerCase()}-${isoDay(today())}.json`; a.click(); URL.revokeObjectURL(url);
  };
  document.getElementById("d-import").onclick=()=>document.getElementById("d-file").click();
  document.getElementById("d-file").onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ try{
      const incoming=JSON.parse(r.result);
      if(!incoming.baby) throw new Error("Not a Baby Tracker backup");
      if(confirm("Replace all current data with this backup?")){ state=deepMerge(structuredClone(DEFAULT_STATE),incoming); save(); render(); }
    }catch(err){ alert("Could not import: "+err.message); } };
    r.readAsText(f);
  };
  document.getElementById("d-reset").onclick=()=>{
    if(confirm("Delete ALL data and start fresh? This cannot be undone (export a backup first).")){
      localStorage.removeItem(KEY); localStorage.removeItem("littlesteps.v1"); state=load(); view="home"; render();
    }
  };
}

render();
</script>
