<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#05080f">
  <script>
    (function(){var r=document.documentElement;var mq=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)");var sd=mq&&mq.matches;var p;try{p=localStorage.getItem("m_theme_pref");}catch(e){}if(p!=="system"&&p!=="light"&&p!=="dark"){p=(p==="other")?(sd?"light":"dark"):"system";}var t=p==="system"?(sd?"dark":"light"):p;r.setAttribute("data-theme",t);r.setAttribute("data-theme-choice",p);})();
    // Hold the content area invisible until the app has rendered (nav-actions
    // reveals; timeout = safety net) so a page switch paints ONCE, complete.
    document.documentElement.classList.add("wire-boot");setTimeout(function(){document.documentElement.classList.remove("wire-boot");},1600);
    ["gesturestart","gesturechange","gestureend"].forEach(function(t){document.addEventListener(t,function(e){e.preventDefault();},{passive:false});});
  </script>
  <!-- Paint the navy background from the very first frame, before the external
       stylesheet loads — otherwise the top strip (above the banner / safe area)
       flashes white during a cross-page navigation until css/styles.css applies. -->
  <style>html{background:#05080f}</style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=7" />
  <meta name="apple-mobile-web-app-title" content="Wire" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Wire Legal</title>
  <meta name="description" content="Practical-Law-style legal updates and case-law alerts for English-law banking, restructuring & insolvency, corporate and funds — sourced from UK Magic Circle, Silver Circle and US-elite London firms. Zero-build static prototype." />
  <link rel="stylesheet" href="css/styles.css?v=20260720-1" />
  <link rel="stylesheet" href="/premium.css?v=20260719-27" />
  <link rel="stylesheet" href="/tui.css?v=20260719-11" />
  <!-- Header (top bar + ticker + briefing) is built by the ONE shared module so
       every page's header is identical. It runs before app.js so the account /
       status mounts exist when app.js fills them. -->
  <script type="module" blocking="render">import { initHeader } from "/header.js?v=20260720-1"; initHeader({ active: "/legal/" });</script>
  <script type="module" blocking="render" src="js/app.js?v=20260720-2"></script>
</head>
<body>
  <a class="skip-link" href="#app">Skip to content</a>

  <div id="wire-header"></div>

  <main id="app" class="container" tabindex="-1"></main>

  <footer class="footer"></footer>

    <!-- Bottom tab bar is injected by nav-actions.js (shared chrome — one copy for all pages). -->
  <script>
    (function(){function r(){if(!matchMedia("(max-width:760px)").matches)return;var f=document.querySelector(".footer");if(!f||document.querySelector(".acct-foot"))return;var b=document.createElement("div");b.className="acct-foot";var a=document.getElementById("account-nav"),d=document.getElementById("data-status");if(a)b.appendChild(a);if(d)b.appendChild(d);if(b.childNodes.length)f.insertBefore(b,f.firstChild);}if(document.readyState!=="loading")r();else document.addEventListener("DOMContentLoaded",r);})();
  </script>
</body>
</html>
