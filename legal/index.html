<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1f44">
  <script>
    (function(){var root=document.documentElement;function sysDark(){try{return matchMedia("(prefers-color-scheme: dark)").matches;}catch(e){return false;}}function choice(){var c;try{c=localStorage.getItem("m_theme");}catch(e){}return (c==="light"||c==="dark"||c==="system"||c==="other")?c:"dark";}function apply(){var c=choice();root.setAttribute("data-theme-choice",c);root.setAttribute("data-theme",c==="system"?(sysDark()?"dark":"light"):c==="other"?(sysDark()?"light":"dark"):c);}apply();try{matchMedia("(prefers-color-scheme: dark)").addEventListener("change",function(){var c=choice();if(c==="system"||c==="other")apply();});}catch(e){}window.__cycleTheme=function(){var c=choice();var n;if(matchMedia("(max-width: 760px)").matches){n=c==="system"?"other":"system";}else{n=root.getAttribute("data-theme")==="dark"?"light":"dark";}try{localStorage.setItem("m_theme",n);}catch(e){}apply();};})();
    document.addEventListener("DOMContentLoaded",function(){var b=document.getElementById("theme-toggle");if(!b)return;function lbl(){var c=document.documentElement.getAttribute("data-theme-choice");var mob=matchMedia("(max-width: 760px)").matches;b.setAttribute("aria-label",mob?(c==="system"?"Theme: matching system — tap to override":"Theme: overriding system — tap to match"):(document.documentElement.getAttribute("data-theme")==="dark"?"Theme: dark — tap for light":"Theme: light — tap for dark"));}lbl();b.addEventListener("click",function(){window.__cycleTheme();lbl();});});
  </script>
  <!-- Paint the navy background from the very first frame, before the external
       stylesheet loads — otherwise the top strip (above the banner / safe area)
       flashes white during a cross-page navigation until css/styles.css applies. -->
  <style>html{background:#05080f}</style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />

  <link rel="stylesheet" href="css/styles.css?v=20260716-6" />
  <link rel="stylesheet" href="/premium.css?v=20260716-7" />

    <div class="platform-switch" role="group" aria-label="Switch platform">

      <a href="/macro/" class="ps-btn">Macro</a>
      <a href="/credit/" class="ps-btn">Credit</a>
      <a href="/legal/" class="ps-btn is-active" aria-current="page">Legal</a>
    </div>
    <nav class="mainnav" aria-label="Primary">
      <a href="#/list" class="nav-link nav-primary">Alerts</a>
      <a href="#/cases" class="nav-link nav-primary">Case law</a>
      <a href="#/restructurings" class="nav-link nav-primary">Schemes and RPs</a>
      <span class="nav-sep" aria-hidden="true"></span>
      <a href="#/list?saved=1" class="nav-link">Saved <span id="saved-count" class="nav-badge"></span></a>
    </nav>

        <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
              <svg class="ico-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 3 a9 9 0 0 1 0 18 z" fill="currentColor" stroke="none"/></svg>

  <script>
    (function(){function r(){if(!matchMedia("(max-width:760px)").matches)return;var f=document.querySelector(".footer");if(!f||document.querySelector(".acct-foot"))return;var b=document.createElement("div");b.className="acct-foot";var a=document.getElementById("account-nav"),d=document.getElementById("data-status");if(a)b.appendChild(a);if(d)b.appendChild(d);if(b.childNodes.length)f.insertBefore(b,f.firstChild);}if(document.readyState!=="loading")r();else document.addEventListener("DOMContentLoaded",r);})();
    // iOS: the notif dropdown is position:fixed on mobile (to escape the sticky
    // bar + body overflow-clip). .notif isn't transform-positioned on phones, so
    // pin the panel under the bell in viewport coords when it opens.
    document.addEventListener("click",function(e){if(!matchMedia("(max-width:760px)").matches)return;var bell=e.target.closest(".notif-bell");if(!bell)return;requestAnimationFrame(function(){var p=document.querySelector(".notif-panel:not([hidden])");if(!p)return;var r=bell.getBoundingClientRect();p.style.top=(Math.round(r.bottom)+8)+"px";p.style.right="8px";p.style.left="auto";});},true);
  </script>


  <script type="module" src="js/app.js?v=20260716-6"></script>
</body>
</html>
