<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#05080f">
  <script>
    (function(){var r=document.documentElement;r.setAttribute("data-theme","dark");r.setAttribute("data-theme-choice","dark");try{localStorage.setItem("m_theme","dark");}catch(e){}})();
    ["gesturestart","gesturechange","gestureend"].forEach(function(t){document.addEventListener(t,function(e){e.preventDefault();},{passive:false});});
  </script>
  <!-- Paint the navy background from the very first frame, before the external
       stylesheet loads — otherwise the top strip (above the banner / safe area)
       flashes white during a cross-page navigation until css/styles.css applies. -->
  <style>html{background:#05080f}</style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=7" />
  <meta name="apple-mobile-web-app-title" content="Wire" />
  <title>Wire Legal</title>
  <meta name="description" content="Practical-Law-style legal updates and case-law alerts for English-law banking, restructuring & insolvency, corporate and funds — sourced from UK Magic Circle, Silver Circle and US-elite London firms. Zero-build static prototype." />
  <link rel="stylesheet" href="css/styles.css?v=20260717-12" />
  <link rel="stylesheet" href="css/styles.css?v=20260717-12" />
  <link rel="stylesheet" href="/premium.css?v=20260717-15" />
  <link rel="stylesheet" href="/tui.css?v=20260717-22" />
</head>
<body>
  <a class="skip-link" href="#app">Skip to content</a>

  <header class="topbar">
    <div class="topbar-inner">
    <a class="brand" href="/" aria-label="Wire Home">
      <span class="logo" aria-hidden="true">/</span>
      <span class="brand-text">
        <strong>Wire</strong>
      </span>
    </a>
    <div class="platform-switch" role="group" aria-label="Switch platform">
      <a href="/" class="ps-btn">Home</a>
      <a href="/macro/" class="ps-btn">Macro</a>
      <a href="/credit/" class="ps-btn">Credit</a>
      <a href="/legal/" class="ps-btn is-active" aria-current="page">Legal</a>
    </div>
    <button class="nav-search" data-open-search type="button" aria-label="Search Wire">
      <span class="ns-lbl">Search everything…</span>
      <kbd>/</kbd>
    </button>
    <div class="topbar-right">
      <div id="account-nav" class="account-nav"></div>
      <div id="data-status" class="data-status"></div>
    </div>
    <div id="notif" class="notif"></div>
    </div>
  </header>

  <!-- Markets ticker + briefing strip (mirrors Home) -->
  <div class="wticker" id="wticker"></div>
  <div class="wbrief" id="wbrief"></div>

  <main id="app" class="container" tabindex="-1"></main>

  <footer class="footer"></footer>

  <nav class="mobile-tabbar" aria-label="Platforms">
    <a class="mtab" href="/" aria-label="Home"><svg class="mtab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11 12 4l8 7"/><path d="M6 9.5V20h12V9.5"/></svg><span class="mtab-lbl">Home</span></a>
    <a class="mtab" href="/macro/"><svg class="mtab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 20V12"/><path d="M12 20V5"/><path d="M19 20V9"/></svg><span class="mtab-lbl">Macro</span></a>
    <a class="mtab" href="/credit/"><svg class="mtab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="7" width="19" height="10" rx="1.5"/><circle cx="12" cy="12" r="2.3"/></svg><span class="mtab-lbl">Credit</span></a>
    <a class="mtab is-active" href="/legal/" aria-current="page"><svg class="mtab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4v15"/><path d="M8 19h8"/><path d="M4 7h16"/><path d="M4 7l-2 4.5h4z"/><path d="M20 7l-2 4.5h4z"/></svg><span class="mtab-lbl">Legal</span></a>
    <button class="mtab mtab-search" type="button" data-open-search aria-label="Search Wire">
      <svg class="mtab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"/><line x1="15.6" y1="15.6" x2="21" y2="21"/></svg>
      <span class="mtab-lbl">Search</span>
    </button>
  </nav>
  <script>
    (function(){function r(){if(!matchMedia("(max-width:760px)").matches)return;var f=document.querySelector(".footer");if(!f||document.querySelector(".acct-foot"))return;var b=document.createElement("div");b.className="acct-foot";var a=document.getElementById("account-nav"),d=document.getElementById("data-status");if(a)b.appendChild(a);if(d)b.appendChild(d);if(b.childNodes.length)f.insertBefore(b,f.firstChild);}if(document.readyState!=="loading")r();else document.addEventListener("DOMContentLoaded",r);})();
  </script>


  <script type="module" src="js/app.js?v=20260717-16"></script>
  <script type="module">import { initNavActions } from "/nav-actions.js?v=20260717-7"; initNavActions();</script>
  <script type="module">import { initBrief } from "/brief.js?v=3"; initBrief();</script>
</body>
</html>
