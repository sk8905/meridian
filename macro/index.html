<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1f44">
  <script>
    (function(){var r=document.documentElement;r.setAttribute("data-theme","dark");r.setAttribute("data-theme-choice","dark");try{localStorage.setItem("m_theme","dark");}catch(e){}})();
  </script>
  <!-- Paint the navy background from the very first frame, before the external
       stylesheet loads — otherwise the top strip (above the banner / safe area)
       flashes white during a cross-page navigation until css/styles.css applies. -->
  <style>html{background:#05080f}</style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
  <meta name="apple-mobile-web-app-title" content="Meridian" />
  <title>Meridian Macro</title>
  <meta name="description" content="Key US &amp; UK macroeconomic indicators — core inflation, wage growth, unemployment, services PMI and the 2-year yield — prototype" />
  <link rel="stylesheet" href="css/styles.css?v=20260716-9" />
  <link rel="stylesheet" href="/premium.css?v=20260716-12" />
  <link rel="stylesheet" href="/tui.css?v=20260716-21" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/" aria-label="Meridian Home">
        <span class="logo" aria-hidden="true">◆</span>
        <span class="brand-text">
          <strong>Meridian</strong>
          <span class="brand-sub">Macro</span>
        </span>
      </a>
      <div class="platform-switch" role="group" aria-label="Switch platform">
        <a href="/" class="ps-btn">Home</a>
        <a href="/macro/" class="ps-btn is-active" aria-current="page">Macro</a>
        <a href="/credit/" class="ps-btn">Credit</a>
        <a href="/legal/" class="ps-btn">Legal</a>
      </div>
      <nav class="mainnav" aria-label="Views">
        <a href="#/commentary" class="nav-link nav-primary">Commentary</a>
        <a href="#/policy" class="nav-link nav-primary">Policy Rate</a>
        <a href="#/cycle" class="nav-link nav-primary">Cycle</a>
        <a href="#/bubble" class="nav-link nav-primary">Bubble</a>
        <span class="nav-sep" aria-hidden="true"></span>
        <a href="#/chart" class="nav-link">Chart</a>
        <a href="#/saved" class="nav-link">Saved</a>
      </nav>
      <button class="nav-search" data-open-search type="button" aria-label="Search Meridian">
        <span class="ns-lbl">Search everything…</span>
        <kbd>/</kbd>
      </button>
      <div class="topbar-right">
        <div id="account-nav" class="account-nav" hidden></div>
        <div id="data-status" class="data-status"></div>
      </div>
      <div id="notif" class="notif"></div>
    </div>
  </header>

  <main id="app" class="container"></main>

  <footer class="footer"></footer>

  <nav class="mobile-tabbar" aria-label="Platforms">
    <a class="mtab" href="/" aria-label="Home"><svg class="mtab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11 12 4l8 7"/><path d="M6 9.5V20h12V9.5"/></svg><span class="mtab-lbl">Home</span></a>
    <a class="mtab is-active" href="/macro/" aria-current="page"><span class="mtab-ico" aria-hidden="true">◆</span><span class="mtab-lbl">Macro</span></a>
    <a class="mtab" href="/credit/"><span class="mtab-ico" aria-hidden="true">◆</span><span class="mtab-lbl">Credit</span></a>
    <a class="mtab" href="/legal/"><span class="mtab-ico" aria-hidden="true">◆</span><span class="mtab-lbl">Legal</span></a>
    <button class="mtab mtab-search" type="button" data-open-search aria-label="Search Meridian">
      <svg class="mtab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"/><line x1="15.6" y1="15.6" x2="21" y2="21"/></svg>
      <span class="mtab-lbl">Search</span>
    </button>
  </nav>
  <script>
    (function(){function r(){if(!matchMedia("(max-width:760px)").matches)return;var f=document.querySelector(".footer");if(!f||document.querySelector(".acct-foot"))return;var b=document.createElement("div");b.className="acct-foot";var a=document.getElementById("account-nav"),d=document.getElementById("data-status");if(a)b.appendChild(a);if(d)b.appendChild(d);if(b.childNodes.length)f.insertBefore(b,f.firstChild);}if(document.readyState!=="loading")r();else document.addEventListener("DOMContentLoaded",r);})();
    // iOS: the notif dropdown is position:fixed on mobile (to escape the sticky
    // bar + body overflow-clip). .notif isn't transform-positioned on phones, so
    // pin the panel under the bell in viewport coords when it opens.
    document.addEventListener("click",function(e){if(!matchMedia("(max-width:760px)").matches)return;var bell=e.target.closest(".notif-bell");if(!bell)return;requestAnimationFrame(function(){var p=document.querySelector(".notif-panel:not([hidden])");if(!p)return;var r=bell.getBoundingClientRect();p.style.top=(Math.round(r.bottom)+8)+"px";p.style.right="8px";p.style.left="auto";});},true);
  </script>


  <script type="module" src="js/app.js?v=20260716-6"></script>
</body>
</html>
