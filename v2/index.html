<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#05080f">
  <script>
    // Resolve the stored theme choice BEFORE first paint (no flash), exactly as
    // the current app does — one inline script, no dependency.
    (function(){var r=document.documentElement;var mq=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)");var sd=mq&&mq.matches;var p;try{p=localStorage.getItem("m_theme_pref");}catch(e){}if(p!=="system"&&p!=="light"&&p!=="dark"){p=(p==="other")?(sd?"light":"dark"):"system";}var t=p==="system"?(sd?"dark":"light"):p;r.setAttribute("data-theme",t);r.setAttribute("data-theme-choice",p);})();
    ["gesturestart","gesturechange","gestureend"].forEach(function(t){document.addEventListener(t,function(e){e.preventDefault();},{passive:false});});
  </script>
  <style>html{background:#05080f}</style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=7" />
  <meta name="apple-mobile-web-app-title" content="Wire" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Wire</title>
  <meta name="description" content="Wire — markets, macro, credit &amp; legal, one surface" />

  <!-- Shared visual language (unchanged from the current app so the look is
       identical). Per-view stylesheets are loaded on demand by the runtime when
       a view is first opened, so nothing pays for CSS it never shows. -->
  <link rel="stylesheet" href="/premium.css?v=20260723-6" />
  <link rel="stylesheet" href="/tui.css?v=20260723-4" />
  <link rel="stylesheet" href="/header.css?v=20260723-4" />
  <link rel="stylesheet" href="/v2/css/app.css?v=v2-16" />

  <!-- ONE runtime, loaded once for the whole app. It owns the router, the shared
       chrome, the in-memory data cache and view lifecycles. There is no
       per-tab document, bundle re-fetch or re-parse — switching tabs swaps a
       view in memory. -->
  <script type="module" src="/v2/js/runtime.js?v=v2-17"></script>
</head>
<body>
  <div id="wire-header"></div>
  <main id="app" class="v2-app"></main>
  <footer class="footer" id="v2-footer"></footer>
  <!-- Bottom tab bar is injected once by the runtime chrome. -->
</body>
</html>
